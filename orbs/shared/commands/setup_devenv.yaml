description: Sets up a devenv for use with E2E testing
parameters:
  provision:
    description: Provision a default developer environment
    type: boolean
    default: true
  e2e:
    description: Run E2E tests on the current repository
    type: boolean
    default: false
  provision_args:
    description: Arguments for provision, optional
    type: string
    default: ""
steps:
  - run:
      name: Setting up devenv
      command: |-
        # E2E (distinct from the orb-level INSTALL_E2E_TOOLS env var)
        # is a behavior flag primarily consumed by
        # ci/testing/setup-devenv.sh: when true, that script asserts
        # E2E tools are on PATH and runs the E2E test suite after
        # provisioning. INSTALL_E2E_TOOLS governs which mise toolset
        # gets installed during CI bootstrap; E2E governs runtime
        # behavior once setup-devenv.sh is invoked.
        PROVISION="<< parameters.provision >>" E2E="<< parameters.e2e >>" PROVISION_ARGS="<< parameters.provision_args >>" \
          ./scripts/shell-wrapper.sh ci/testing/setup-devenv.sh
